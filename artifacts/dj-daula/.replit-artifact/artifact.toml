kind = "web"
previewPath = "/"
title = "DJ Daula"
version = "1.0.0"
id = "artifacts/dj-daula"
router = "path"

[[integratedSkills]]
name = "nextjs"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3001

[services.development]
run = "pnpm --filter @workspace/dj-daula run dev"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/dj-daula", "run", "build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["pnpm", "--filter", "@workspace/dj-daula", "run", "start"]

[services.production.run.env]
PORT = "3001"
NODE_ENV = "production"

[services.env]
PORT = "3001"
